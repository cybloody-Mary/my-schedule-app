function renderTrendChart(){
  const canvas=document.getElementById('chart-trend'),ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const days=[],counts=[];
  for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const dk=dateKey(d);days.push(`${d.getMonth()+1}/${d.getDate()}`);counts.push((db.tasks[dk]||[]).filter(t=>t.done).length);}
  const W=canvas.width,H=canvas.height,pad={t:20,r:20,b:40,l:30};
  const dw=W-pad.l-pad.r,dh=H-pad.t-pad.b,max=Math.max(...counts,1);
  // Grid
  ctx.strokeStyle='#e0ddd8';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad.t+dh*(1-i/4);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='#a8a39c';ctx.font='10px DM Mono';ctx.fillText(Math.round(max*i/4),2,y+4);}
  // Line
  const pts=counts.map((c,i)=>({x:pad.l+i/(days.length-1)*dw,y:pad.t+dh*(1-c/max)}));
  ctx.beginPath();ctx.strokeStyle='var(--accent,#C4601A)';ctx.lineWidth=2.5;ctx.lineJoin='round';pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();
  // Fill
  ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.lineTo(pts[pts.length-1].x,pad.t+dh);ctx.lineTo(pts[0].x,pad.t+dh);ctx.closePath();ctx.fillStyle='rgba(196,96,26,0.12)';ctx.fill();
  // Dots & labels
  pts.forEach((p,i)=>{ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,Math.PI*2);ctx.fillStyle='var(--accent,#C4601A)';ctx.fill();if(i%2===0){ctx.fillStyle='#a8a39c';ctx.font='9px DM Mono';ctx.textAlign='center';ctx.fillText(days[i],p.x,H-pad.b+14);}});
}

function renderCatChart(catMap){
  const canvas=document.getElementById('chart-cat'),ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const entries=Object.entries(catMap);
  if(!entries.length){ctx.fillStyle='#a8a39c';ctx.font='13px Noto Sans SC';ctx.textAlign='center';ctx.fillText('暂无数据',canvas.width/2,canvas.height/2);return;}
  const total=entries.reduce((s,[,v])=>s+v,0);
  const colors=['#C4601A','#1A6FA8','#3A7A28','#8B2FC0','#C02848','#C08020','#208080','#C04040','#606060'];
  const cx=120,cy=100,r=70;
  let angle=-Math.PI/2;
  entries.forEach(([cat,cnt],i)=>{
    const slice=cnt/total*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();
    ctx.fillStyle=colors[i%colors.length];ctx.fill();
    // Label line
    const mid=angle+slice/2,lx=cx+Math.cos(mid)*(r+20),ly=cy+Math.sin(mid)*(r+20);
    ctx.strokeStyle=colors[i%colors.length];ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(cx+Math.cos(mid)*r,cy+Math.sin(mid)*r);ctx.lineTo(lx,ly);ctx.stroke();
    ctx.fillStyle=colors[i%colors.length];ctx.font='10px Noto Sans SC';ctx.textAlign=lx>cx?'left':'right';
    ctx.fillText(`${cat}(${cnt})`,lx+(lx>cx?3:-3),ly+4);
    angle+=slice;
  });
  // Center
  ctx.beginPath();ctx.arc(cx,cy,r*0.55,0,Math.PI*2);ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--surface')||'#fff';ctx.fill();
  ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--tp')||'#333';ctx.font='bold 16px DM Mono';ctx.textAlign='center';ctx.fillText(total,cx,cy+6);
  ctx.font='10px Noto Sans SC';ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--ts')||'#888';ctx.fillText('已完成',cx,cy+20);
}

function closeModal(id){document.getElementById(id).classList.remove('open');}

// Modal backdrop close
['task-modal','confirm-modal','node-modal','diag-name-modal','export-modal','batch-modal','alarm-name-modal','pomo-custom-modal'].forEach(id=>{
  const el=document.getElementById(id);if(el)el.addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal(id);});
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')['task-modal','confirm-modal','node-modal','diag-name-modal','export-modal','batch-modal','alarm-name-modal','pomo-custom-modal'].forEach(closeModal);
  if(e.key==='Enter'){
    if(document.getElementById('task-modal').classList.contains('open')&&document.activeElement.tagName!=='TEXTAREA')saveTask();
    if(document.getElementById('node-modal').classList.contains('open')&&document.activeElement.tagName!=='TEXTAREA')saveNodeContent();
    if(document.getElementById('diag-name-modal').classList.contains('open'))saveDiagName();
    if(document.getElementById('alarm-name-modal').classList.contains('open'))confirmAddAlarm();
    if(document.getElementById('pomo-custom-modal').classList.contains('open'))applyPomoCustom();
  }
});

function seedDemo(){
  const today=todayKey();
  if(db.tasks[today]&&db.tasks[today].length>0)return;
  const tmr=dateKey(new Date(Date.now()+86400000));
  db.tasks[today]=[
    {id:uid(),name:'季度汇报准备',desc:'整理Q1数据，制作PPT',start:'09:00',end:'11:00',done:false,highlight:true,color:0,cat:'工作'},
    {id:uid(),name:'团队周会',desc:'同步各组进度',start:'14:00',end:'15:00',done:false,highlight:true,color:1,cat:'工作'},
    {id:uid(),name:'阅读《深度工作》',desc:'每日阅读30分钟',start:'20:00',end:'20:30',done:true,highlight:false,color:2,cat:'学习'},
    {id:uid(),name:'回复邮件',desc:'处理积压邮件',start:'11:30',end:'12:30',done:false,highlight:false,color:0,cat:'工作'},
  ];
  db.tasks[tmr]=[{id:uid(),name:'产品评审会议',desc:'评审新功能',start:'10:00',end:'12:00',done:false,highlight:true,color:3,cat:'工作'}];
  if(!db.diagrams.length){db.diagrams.push({id:uid(),name:'我的规划',type:'public',nodes:[{id:uid(),text:'项目总览',collapsed:false,children:[{id:uid(),text:'调研阶段',collapsed:false,children:[{id:uid(),text:'收集资料',collapsed:false,children:[]},{id:uid(),text:'整理归纳',collapsed:false,children:[]}]},{id:uid(),text:'执行阶段',collapsed:false,children:[{id:uid(),text:'任务分配',collapsed:false,children:[]}]}]}]});}
  save();
}
